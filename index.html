<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bakery 工時系統</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f7f6; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        #calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .day-box { border: 1px solid #ddd; min-height: 80px; padding: 2px; font-size: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>新增工時</h3>
        <select id="nameInput"><option>站起來</option><option>佑廷</option><option>子珈</option></select>
        <select id="dayInput"></select>
        <button onclick="addRecord()">新增</button>
        <button onclick="syncToCloud()">同步至雲端</button>
    </div>
    <div class="card">
        <div id="calendar"></div>
    </div>

<script>
    // 這裡放入你剛給我的那組新網址  
    //               https://script.google.com/macros/s/AKfycbwmLSoxg58dONNYlTRaOwCE-Yt7ST5A_UN0l0s4nzi5rFIOc7TtwnB0B54KNRiicyaY/exec
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwmLSoxg58dONNYlTRaOwCE-Yt7ST5A_UN0l0s4nzi5rFIOc7TtwnB0B54KNRiicyaY/exec";
    let data = [];

    async function init() {
        for(let i=1; i<=31; i++) document.getElementById('dayInput').innerHTML += `<option>${i}</option>`;
        const res = await fetch(`${GAS_URL}?action=getData`);
        data = await res.json();
        render();
    }

    function render() {
        document.getElementById('calendar').innerHTML = "";
        for(let i=1; i<=31; i++) {
            let dayData = data.filter(r => r.day == i);
            document.getElementById('calendar').innerHTML += `<div class="day-box"><div>${i}</div>` + 
                dayData.map(r => `<div>${r.name}</div>`).join('') + `</div>`;
        }
    }

    function addRecord() {
        data.push({month: "2026-03", name: document.getElementById('nameInput').value, day: document.getElementById('dayInput').value, start: "08:00", end: "17:00"});
        render();
    }

    async function syncToCloud() {
        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
        alert("同步完成！");
    }
    window.onload = init;
</script>
</body>
</html>
